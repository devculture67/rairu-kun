<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama UI — devculture67</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
    .badge { background: #1f6feb; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
    .badge.green { background: #1a7f37; }
    .container { flex: 1; display: flex; flex-direction: column; max-width: 900px; width: 100%; margin: 0 auto; padding: 20px; gap: 16px; }
    .model-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .model-bar label { font-size: 13px; color: #8b949e; white-space: nowrap; }
    select, input[type=text] { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
    select { min-width: 200px; }
    .chat-box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; overflow-y: auto; min-height: 350px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .msg.user .avatar { background: #1f6feb; }
    .msg.ai .avatar { background: #1a7f37; }
    .msg .bubble { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; max-width: 85%; }
    .msg.user { flex-direction: row-reverse; }
    .msg.user .bubble { background: #1f3048; }
    .input-bar { display: flex; gap: 10px; }
    .input-bar textarea { flex: 1; background: #161b22; border: 1px solid #30363d; color: #e6edf3; border-radius: 8px; padding: 12px 14px; font-size: 14px; resize: none; height: 80px; line-height: 1.5; }
    .input-bar textarea:focus { outline: none; border-color: #1f6feb; }
    .btn { background: #1f6feb; color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .btn:hover { background: #388bfd; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn.danger { background: #da3633; }
    .status { font-size: 12px; color: #8b949e; text-align: center; padding: 8px; }
    .thinking { color: #8b949e; font-style: italic; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .info-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #8b949e; }
    .info-box code { background: #0d1117; padding: 2px 6px; border-radius: 4px; color: #79c0ff; font-family: monospace; }
  </style>
</head>
<body>
  <header>
    <div style="font-size:22px">🤖</div>
    <h1>Ollama UI</h1>
    <span class="badge" id="status-badge">Connecting...</span>
    <span style="margin-left:auto;font-size:12px;color:#8b949e">devculture67/rairu-kun</span>
  </header>

  <div class="container">
    <div class="model-bar">
      <label>Model:</label>
      <select id="model-select"><option value="">Loading...</option></select>
      <input type="text" id="system-prompt" placeholder="System prompt (opsional)" style="flex:1;min-width:200px">
      <button class="btn danger" onclick="clearChat()" style="padding:6px 14px;font-size:12px">Hapus Chat</button>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="status">Memuat model dari Ollama...</div>
    </div>

    <div class="input-bar">
      <textarea id="user-input" placeholder="Ketik pesan di sini... (Enter = kirim, Shift+Enter = baris baru)"></textarea>
      <button class="btn" id="send-btn" onclick="sendMessage()">Kirim</button>
    </div>

    <div class="info-box">
      API endpoint: <code>GET/POST /api/</code> — 
      Pull model baru via SSH: <code>ollama pull llama3.2</code> atau <code>ollama pull mistral</code>
    </div>
  </div>

  <script>
    const API = '/api';
    let messages = [];
    let controller = null;

    async function loadModels() {
      try {
        const r = await fetch(API + '/tags');
        const d = await r.json();
        const sel = document.getElementById('model-select');
        const badge = document.getElementById('status-badge');
        if (d.models && d.models.length > 0) {
          sel.innerHTML = d.models.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
          badge.textContent = 'Online';
          badge.className = 'badge green';
          document.getElementById('chat-box').innerHTML = `<div class="status">✅ ${d.models.length} model tersedia. Pilih model dan mulai chat!</div>`;
        } else {
          sel.innerHTML = '<option value="">Belum ada model</option>';
          badge.textContent = 'No Models';
          document.getElementById('chat-box').innerHTML = `<div class="status">⚠️ Belum ada model. Pull dulu via SSH:<br><code style="background:#0d1117;padding:4px 8px;border-radius:4px;color:#79c0ff">ollama pull llama3.2</code></div>`;
        }
      } catch(e) {
        document.getElementById('status-badge').textContent = 'Offline';
        document.getElementById('chat-box').innerHTML = '<div class="status">❌ Ollama tidak tersedia. Cek apakah service sudah berjalan.</div>';
        setTimeout(loadModels, 5000);
      }
    }

    function addMsg(role, text) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '🤖'}</div><div class="bubble" id="msg-${Date.now()}">${escHtml(text)}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div.querySelector('.bubble');
    }

    function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function clearChat() { messages = []; document.getElementById('chat-box').innerHTML = '<div class="status">Chat dihapus.</div>'; }

    document.getElementById('user-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const model = document.getElementById('model-select').value;
      const sys = document.getElementById('system-prompt').value.trim();
      const text = input.value.trim();
      if (!text || !model) return;

      input.value = '';
      document.getElementById('send-btn').disabled = true;

      addMsg('user', text);
      messages.push({ role: 'user', content: text });

      const thinkBubble = addMsg('ai', '⏳ Thinking...');
      thinkBubble.className = 'bubble thinking';

      const body = { model, messages: sys ? [{ role:'system', content:sys }, ...messages] : messages, stream: true };

      try {
        controller = new AbortController();
        const r = await fetch(API + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal
        });

        let fullText = '';
        thinkBubble.className = 'bubble';
        thinkBubble.textContent = '';

        const reader = r.body.getReader();
        const dec = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const lines = dec.decode(value).split('\n').filter(Boolean);
          for (const line of lines) {
            try {
              const j = JSON.parse(line);
              if (j.message?.content) {
                fullText += j.message.content;
                thinkBubble.textContent = fullText;
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
              }
            } catch {}
          }
        }
        messages.push({ role: 'assistant', content: fullText });
      } catch(e) {
        thinkBubble.className = 'bubble';
        thinkBubble.textContent = '❌ Error: ' + (e.message || 'Gagal menghubungi Ollama');
      } finally {
        document.getElementById('send-btn').disabled = false;
        controller = null;
      }
    }

    loadModels();
  </script>
</body>
</html>
