name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - Devculture
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy — Devculture → Railway
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Trigger Railway Redeploy
        run: |
          RESULT=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"eca17658-34de-42d9-a578-655bfbfb9811\", environmentId: \"1a550fb3-fd9f-49af-bc9d-ae3e48bbf473\") }"}')
          echo "Response: $RESULT"
          if echo "$RESULT" | grep -q '"serviceInstanceDeploy":true'; then
            echo "✅ Railway redeploy triggered!"
          else
            echo "❌ Failed: $RESULT"
            exit 1
          fi

      - name: ✅ Notify ntfy — Deploy Berhasil
        if: success()
        run: |
          curl -s -X POST "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" \
            -H "Title: ✅ Deploy Berhasil — Devculture" \
            -H "Priority: high" \
            -H "Tags: white_check_mark,rocket" \
            -d "Branch Devculture berhasil di-deploy ke Railway!

          📦 Commit : ${{ github.sha }}
          👤 Author : ${{ github.actor }}
          💬 Message: ${{ github.event.head_commit.message }}"

      - name: ❌ Notify ntfy — Deploy Gagal
        if: failure()
        run: |
          curl -s -X POST "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" \
            -H "Title: ❌ Deploy GAGAL — Devculture" \
            -H "Priority: urgent" \
            -H "Tags: x,rotating_light" \
            -d "Deploy ke Railway GAGAL!

          📦 Commit : ${{ github.sha }}
          👤 Author : ${{ github.actor }}

          Cek: https://github.com/devculture67/rairu-kun/actions"
